name: Bootstrap Manifest Sandbox v0.190

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/bootstrap-manifest-sandbox-v0190.yaml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    runs-on: ubuntu-latest
    steps:
      - name: Import official v0.190.0 and apply MNFST ownership
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          workdir="$(mktemp -d)"
          trap 'rm -rf "$workdir"' EXIT
          git init "$workdir"
          cd "$workdir"
          git remote add upstream https://github.com/daytonaio/daytona.git
          git fetch --depth=1 upstream refs/tags/v0.190.0
          git checkout --detach FETCH_HEAD
          printf '%s' '' | base64 --decode > README.md
          printf '%s' '' | base64 --decode > nx.json
          mkdir -p .github/workflows
          printf '%s' '' | base64 --decode > .github/workflows/manifest-sandbox-publish.yaml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add README.md nx.json .github/workflows/manifest-sandbox-publish.yaml
          git commit -m "feat(sandbox): own v0.190 release pipeline"
          gh auth setup-git
          git push https://github.com/corvus-inc-hub/daytona.git HEAD:refs/heads/manifest-sandbox/v0.190.0
